; Kronuz theme for fast-syntax-highlighting.
;
; Matches the bat/delta/eza Kronuz palette (integrations/bat/themes/Kronuz.tmTheme):
;   gold   #e8bf6a  commands / functions      orange #cc7833  builtins / keywords
;   green  #a5c261  strings                   tan    #caa473  options
;   blue   #6e9cbe  variables                 grey   #95815e  comments
;   red    #da4939  errors / unknown          orange #d08442  escapes
;
; Applied by ./setup.sh (runs `fast-theme` into fsh's work dir); truecolor hex needs
; a 24-bit terminal (degrades to the nearest colour otherwise).

[base]
default          = none
unknown-token    = #da4939,bold
commandseparator = none
redirection      = #d08442
here-string-tri  = #caa473
here-string-text = #a5c261
here-string-var  = #6e9cbe
exec-descriptor  = #e8bf6a,bold
comment          = #95815e
correct-subtle   = #6e9cbe
incorrect-subtle = #da4939
subtle-separator = #a5c261
subtle-bg        = bg:#383838
secondary        = free
recursive-base   = none

[command-point]
reserved-word     = #cc7833
subcommand        = #e8bf6a
alias             = #e8bf6a
suffix-alias      = #e8bf6a
global-alias      = #e8bf6a
builtin           = #cc7833
function          = #e8bf6a
command           = #e8bf6a
precommand        = #e8bf6a
hashed-command    = #e8bf6a
single-sq-bracket = #cc7833
double-sq-bracket = #cc7833
double-paren      = #cc7833

[paths]
path          = none
pathseparator =
path-to-dir   = underline
globbing      = #6e9cbe,bold
globbing-ext  = #6e9cbe

[brackets]
paired-bracket  = bg:#454545
bracket-level-1 = #a5c261,bold
bracket-level-2 = #e8bf6a,bold
bracket-level-3 = #6e9cbe,bold

[arguments]
single-hyphen-option   = #caa473
double-hyphen-option   = #caa473
optarg-string          = #a5c261
optarg-number          = #a5c260
back-quoted-argument   = none
single-quoted-argument = #a5c261
double-quoted-argument = #a5c261
dollar-quoted-argument = #a5c261

[in-string]
back-dollar-quoted-argument           = #d08442
back-or-dollar-double-quoted-argument = #d08442

[other]
variable             = #6e9cbe
assign               = none
assign-array-bracket = #cc7833
history-expansion    = #6e9cbe,bold

[math]
mathvar = #6e9cbe,bold
mathnum = #a5c260
matherr = #da4939

[for-loop]
forvar  = none
fornum  = #a5c260
foroper = #cc7833
forsep  = #cc7833,bold

[case]
case-input       = #e8bf6a
case-parentheses = #cc7833
case-condition   = bg:#454545
