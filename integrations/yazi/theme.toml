# Kronuz theme for yazi (matches the bat/delta/eza palette).
#
# yazi reads its theme from its config dir ($YAZI_CONFIG_HOME, else
# $XDG_CONFIG_HOME/yazi, else ~/.config/yazi). ../yazi/setup.sh offers to link this file
# there at install (a [y/N] prompt), along with the shared ../themes/Kronuz.tmTheme for
# the syntect code preview. To do it by hand instead:
#   mkdir -p ~/.config/yazi
#   ln -sf "$KRONUZSH/integrations/yazi/theme.toml" ~/.config/yazi/theme.toml
#   ln -sf "$KRONUZSH/integrations/themes/Kronuz.tmTheme" ~/.config/yazi/Kronuz.tmTheme
# (Schema follows yazi's v25+ layout; tweak keys if your yazi differs.)

[mgr]
cwd = { fg = "#6e9cbe" }

# Code-preview syntax highlighting uses the shared Kronuz tmTheme (same one bat/delta
# use). yazi/setup.sh links it into the yazi config dir. yazi wants an absolute path
# here (a relative one silently falls back to its default theme), so this points at the
# default ~/.config/yazi — adjust it if your yazi config dir differs (custom
# $XDG_CONFIG_HOME / $YAZI_CONFIG_HOME).
syntect_theme = "~/.config/yazi/Kronuz.tmTheme"

find_keyword  = { fg = "#e8bf6a", bold = true, italic = true }
find_position = { fg = "#da4939", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "#a5c261", bg = "#a5c261" }
marker_cut      = { fg = "#da4939", bg = "#da4939" }
marker_marked   = { fg = "#6e9cbe", bg = "#6e9cbe" }
marker_selected = { fg = "#e8bf6a", bg = "#e8bf6a" }

count_copied   = { fg = "#383838", bg = "#a5c261" }
count_cut      = { fg = "#383838", bg = "#da4939" }
count_selected = { fg = "#383838", bg = "#e8bf6a" }

border_symbol = "│"
border_style  = { fg = "#676867" }

# Indicator bar on the hovered row (per pane). Was [mgr] hovered/preview_hovered in
# older yazi; moved to [indicator] current/parent/preview in v25+.
[indicator]
parent  = { fg = "#383838", bg = "#caa473" }
current = { fg = "#383838", bg = "#e8bf6a" }
preview = { underline = true }

[mode]
normal_main = { fg = "#383838", bg = "#6e9cbe", bold = true }
normal_alt  = { fg = "#6e9cbe", bg = "#454545" }
select_main = { fg = "#383838", bg = "#a5c261", bold = true }
select_alt  = { fg = "#a5c261", bg = "#454545" }
unset_main  = { fg = "#383838", bg = "#cc7833", bold = true }
unset_alt   = { fg = "#cc7833", bg = "#454545" }

[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type  = { fg = "#6e9cbe" }
perm_read  = { fg = "#e8bf6a" }
perm_write = { fg = "#da4939" }
perm_exec  = { fg = "#a5c261" }
perm_sep   = { fg = "#676867" }
progress_label  = { bold = true }
progress_normal = { fg = "#6e9cbe", bg = "#454545" }
progress_error  = { fg = "#da4939", bg = "#454545" }

[input]
border   = { fg = "#6e9cbe" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#6e9cbe" }
active   = { fg = "#e8bf6a", bold = true }
inactive = {}

[confirm]
border     = { fg = "#6e9cbe" }
title      = { fg = "#6e9cbe" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}

[cmp]
border = { fg = "#6e9cbe" }

[tasks]
border  = { fg = "#6e9cbe" }
title   = {}
hovered = { fg = "#e8bf6a", underline = true }

[which]
mask            = { bg = "#454545" }
cand            = { fg = "#6e9cbe" }
rest            = { fg = "#95815e" }
desc            = { fg = "#e8bf6a" }
separator       = "  "
separator_style = { fg = "#676867" }

[help]
on      = { fg = "#e8bf6a" }
run     = { fg = "#a5c261" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#c8c6c5", bg = "#383838" }

[notify]
title_info  = { fg = "#a5c261" }
title_warn  = { fg = "#e8bf6a" }
title_error = { fg = "#da4939" }

[filetype]
rules = [
  { mime = "image/*", fg = "#e8bf6a" },
  { mime = "{audio,video}/*", fg = "#caa473" },
  { mime = "application/{,g}zip", fg = "#da4939" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#da4939" },
  { mime = "application/{pdf,doc,rtf}", fg = "#da4939" },
  { url = "*", is = "orphan", fg = "#da4939" },
  { url = "*", is = "exec", fg = "#cc7833" },
  { url = "*/", fg = "#6e9cbe" },
]
