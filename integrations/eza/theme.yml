# Kronuz palette for eza, derived from the Kronuz color scheme
# (github.com/Kronuz/Kronuz-Theme). This file themes eza's UI columns
# (filekinds, perms, size, owner, dates, git) in calm, varied tones. Nothing
# bold. NOTE: eza reads $LS_COLORS and it OVERRIDES the `filekinds` colours below
# for the *filename* (precedence: $EZA_COLORS > $LS_COLORS > this file). So the
# filekinds here are kept in lock-step with the `core:` block of the vivid theme
# integrations/vivid/kronuz.yml (which generates $LS_COLORS); change one, change the
# other. Per-extension *filename* colours also come from $LS_COLORS / $EZA_COLORS,
# not from here.
#
# eza auto-loads this when $EZA_CONFIG_DIR points at this directory;
# integrations.zsh sets that to $KRONUZSH/eza. Edit freely, or point
# EZA_CONFIG_DIR elsewhere in ~/.zshrc.local to use your own.
colourful: true

filekinds:
  normal: {foreground: '#c8c6c5'}
  directory: {foreground: "#6e9cbe"}
  symlink: {foreground: '#7ea4cc'}        # blue
  executable: {foreground: '#a5c261'}     # green
  pipe: {foreground: '#7a7775'}
  block_device: {foreground: '#cc7833'}
  char_device: {foreground: '#cc7833'}
  socket: {foreground: '#7a7775'}
  special: {foreground: '#caa473'}
  mount_point: {foreground: '#6089b4'}

perms:
  user_read: {foreground: '#c8c6c5'}
  user_write: {foreground: '#cc7833'}
  user_execute_file: {foreground: '#9aa83a'}
  user_execute_other: {foreground: '#a5c261'}
  group_read: {foreground: '#c8c6c5'}
  group_write: {foreground: '#cc7833'}
  group_execute: {foreground: '#9aa83a'}
  other_read: {foreground: '#c8c6c5'}
  other_write: {foreground: '#cc7833'}
  other_execute: {foreground: '#9aa83a'}
  special_user_file: {foreground: '#caa473'}
  special_other: {foreground: '#6e9cbe'}
  attribute: {foreground: '#c8c6c5'}

size:
  major: {foreground: '#a5c261'}          # green
  minor: {foreground: '#7a7775'}
  number_byte: {foreground: '#9a9794'}
  number_kilo: {foreground: '#a5c261'}
  number_mega: {foreground: '#9aa83a'}
  number_giga: {foreground: '#cc7833'}
  number_huge: {foreground: '#da4939'}
  unit_byte: {foreground: '#9a9794'}
  unit_kilo: {foreground: '#a5c261'}
  unit_mega: {foreground: '#9aa83a'}
  unit_giga: {foreground: '#cc7833'}
  unit_huge: {foreground: '#da4939'}

users:
  user_you: {foreground: '#9a9794'}       # calm neutral (was mustard)
  user_root: {foreground: '#da4939'}
  user_other: {foreground: '#676867'}
  group_yours: {foreground: '#9a9794'}
  group_root: {foreground: '#da4939'}
  group_other: {foreground: '#676867'}

links:
  normal: {foreground: '#7ea4cc'}
  multi_link_file: {foreground: '#cc7833'}

git:
  new: {foreground: '#219186'}            # teal
  modified: {foreground: '#cb4b16'}       # orange
  deleted: {foreground: '#dc322f'}        # red
  renamed: {foreground: '#6089b4'}        # blue
  typechange: {foreground: '#cc7833'}
  ignored: {foreground: '#676867'}
  conflicted: {foreground: '#da4939'}

punctuation: {foreground: '#676867'}
date: {foreground: '#7a7775'}
inode: {foreground: '#676867'}
blocks: {foreground: '#7a7775'}
header: {foreground: '#7a7775'}
octal: {foreground: '#7a7775'}
flags: {foreground: '#7a7775'}
symlink_path: {foreground: '#676867'}
control_char: {foreground: '#da4939'}
broken_symlink: {foreground: '#dc322f'}
broken_path_overlay: {foreground: '#676867'}
